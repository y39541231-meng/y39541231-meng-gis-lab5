<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">

        <style>
        html, body {
            background-color: #ffffff;
        }
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        }

        .mouse-position-box {
            position: fixed;
            right: 12px;
            bottom: 28px;
            z-index: 999999;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            box-shadow: 0 1px 5px rgba(0,0,0,0.35);
            color: #333;
        }

        .custom-scale-box {
            position: fixed;
            left: 12px;
            bottom: 28px;
            z-index: 999999;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 10px 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            box-shadow: 0 1px 5px rgba(0,0,0,0.35);
            text-align: center;
            min-width: 110px;
            color: #333;
        }

        .custom-scale-line {
            height: 6px;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
            border-bottom: 3px solid #333;
            margin-top: 3px;
        }
        </style>

        <title></title>
    </head>

    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>

            <div id="custom-scale" class="custom-scale-box">
                <div id="scale-text">Scale</div>
                <div id="scale-line" class="custom-scale-line"></div>
            </div>

            <div id="mouse-position" class="mouse-position-box">Move mouse over map</div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/Italyboundaries_2.js"></script>
        <script src="styles/Italyboundaries_2_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>

        <script>
        window.addEventListener('load', function () {
            function addCustomControls() {
                if (typeof map === 'undefined') {
                    setTimeout(addCustomControls, 500);
                    return;
                }

                map.on('pointermove', function (evt) {
                    var coord = ol.proj.toLonLat(evt.coordinate);
                    document.getElementById('mouse-position').innerHTML =
                        coord[0].toFixed(4) + ', ' + coord[1].toFixed(4);
                });

                function updateScale() {
                    var view = map.getView();
                    var resolution = view.getResolution();
                    var projection = view.getProjection();
                    var metersPerUnit = projection.getMetersPerUnit() || 1;

                    var scaleWidthPx = 100;
                    var meters = resolution * metersPerUnit * scaleWidthPx;

                    var niceMeters;
                    if (meters >= 1000000) {
                        niceMeters = Math.round(meters / 1000000) * 1000000;
                    } else if (meters >= 100000) {
                        niceMeters = Math.round(meters / 100000) * 100000;
                    } else if (meters >= 10000) {
                        niceMeters = Math.round(meters / 10000) * 10000;
                    } else if (meters >= 1000) {
                        niceMeters = Math.round(meters / 1000) * 1000;
                    } else if (meters >= 100) {
                        niceMeters = Math.round(meters / 100) * 100;
                    } else {
                        niceMeters = Math.round(meters);
                    }

                    if (niceMeters <= 0) {
                        niceMeters = meters;
                    }

                    var newWidth = niceMeters / (resolution * metersPerUnit);

                    if (newWidth < 50) {
                        newWidth = 50;
                    }
                    if (newWidth > 160) {
                        newWidth = 160;
                    }

                    document.getElementById('scale-line').style.width = newWidth + 'px';

                    if (niceMeters >= 1000) {
                        document.getElementById('scale-text').innerHTML =
                            (niceMeters / 1000).toFixed(0) + ' km';
                    } else {
                        document.getElementById('scale-text').innerHTML =
                            niceMeters.toFixed(0) + ' m';
                    }
                }

                map.getView().on('change:resolution', updateScale);
                map.getView().on('change:center', updateScale);
                updateScale();
            }

            addCustomControls();
        });
        </script>
    </body>
</html>
